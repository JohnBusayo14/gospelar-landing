<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Get Gospelar — GOFAMINT Sunday School</title>
<meta name="description" content="Download Gospelar on Android and iOS.">
<link rel="icon" href="/favicon.ico">

<!-- Auto-redirect signals for the stores. Replace ID once published. -->
<meta name="google-play-app" content="app-id=com.gofamint.sundayschool">
<meta name="apple-itunes-app" content="app-id=APP_STORE_ID_PLACEHOLDER">

<style>
:root { --blue:#1A56DB; --blue-dark:#1E40AF; --blue-light:#EFF6FF; --text:#0F172A; --muted:#64748B; --border:#E2E8F0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(180deg, var(--blue-light) 0%, #fff 60%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.wrap { text-align: center; padding: 32px 24px; max-width: 480px; }
.logo-mark { width: 72px; height: 72px; border-radius: 18px; background: var(--blue); color: #fff; display: grid; place-items: center; font-weight: 900; font-size: 32px; margin: 0 auto 24px; box-shadow: 0 12px 32px rgba(26,86,219,.25); }
h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; }
p.lead { color: var(--muted); font-size: 17px; margin-bottom: 36px; }

.store-btn {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  padding: 16px 24px; background: var(--text); color: #fff; border-radius: 16px;
  text-decoration: none; font-weight: 700; margin-bottom: 14px;
  transition: transform .12s ease, box-shadow .2s ease;
}
.store-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(15,23,42,.18); }
.store-btn .icon { font-size: 28px; }
.store-btn .text { text-align: left; line-height: 1.2; }
.store-btn .text small { display: block; font-size: 11px; font-weight: 600; opacity: .7; letter-spacing: .5px; }
.store-btn .text strong { font-size: 17px; font-weight: 800; }

.note { margin-top: 28px; font-size: 13px; color: var(--muted); }
.note a { color: var(--blue); }

footer { margin-top: 48px; font-size: 12px; color: var(--muted); }
footer a { color: var(--muted); margin: 0 8px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo-mark">G</div>
  <h1>Get Gospelar</h1>
  <p class="lead">GOFAMINT Sunday School in your pocket — lessons, hymns, quizzes, and class management.</p>

  <a href="https://play.google.com/store/apps/details?id=com.gofamint.sundayschool" class="store-btn" id="play-btn">
    <span class="icon">🤖</span>
    <span class="text"><small>GET IT ON</small><strong>Google Play</strong></span>
  </a>

  <a href="https://apps.apple.com/app/idAPP_STORE_ID_PLACEHOLDER" class="store-btn" id="ios-btn">
    <span class="icon">🍎</span>
    <span class="text"><small>DOWNLOAD ON THE</small><strong>App Store</strong></span>
  </a>

  <p class="note">Already installed? <a href="gospelar://open">Open the app</a><br>Need help? <a href="mailto:hello@gospelar.com">hello@gospelar.com</a></p>

  <footer>
    <a href="/">Home</a> · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a>
  </footer>
</div>

<script>
// Auto-jump to the right store on mobile so users don't have to pick.
(function () {
  var ua = navigator.userAgent || '';
  var isIOS     = /iPhone|iPad|iPod/i.test(ua);
  var isAndroid = /Android/i.test(ua);
  // Only auto-redirect if we landed here from a tap (not a refresh of the page
  // they manually opened), and only on mobile devices.
  if (document.referrer && (isIOS || isAndroid)) {
    setTimeout(function () {
      if (isIOS)     window.location.href = document.getElementById('ios-btn').href;
      if (isAndroid) window.location.href = document.getElementById('play-btn').href;
    }, 400);
  }
})();
</script>

</body>
</html>
